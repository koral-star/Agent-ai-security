name: Daily AI Security Digest

on:
  schedule:
    - cron: '0 4 * * *'  # Every day at 7:00 AM Israel time (UTC+3)
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/add-claude-documentation-B8KFd

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run digest script
        run: python3 daily_digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Read digest content
        id: digest
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          cp digests/${DATE}_brief.md /tmp/brief.md
          cp digests/${DATE}_ntfy.json /tmp/ntfy_notifications.json

      - name: Deploy presentation to GitHub Pages
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p /tmp/pages
          # Copy today's presentation as the main page
          cp digests/$DATE.html /tmp/pages/index.html
          cp digests/$DATE.html /tmp/pages/$DATE.html
          # Generate a simple archive index
          echo "<html><head><meta charset='UTF-8'><title>AI Security Digests</title></head><body style='font-family:sans-serif;max-width:600px;margin:40px auto;'>" > /tmp/pages/archive.html
          echo "<h2>🔐 AI Security Digest Archive</h2><ul>" >> /tmp/pages/archive.html
          for f in digests/*.html; do
            fname=$(basename $f .html)
            echo "<li><a href='$fname.html'>$fname</a></li>" >> /tmp/pages/archive.html
            cp $f /tmp/pages/$fname.html 2>/dev/null || true
          done
          echo "</ul></body></html>" >> /tmp/pages/archive.html
          # Push to gh-pages branch
          cd /tmp/pages
          git init
          git config user.name "AI Security Digest Bot"
          git config user.email "digest-bot@koral-shimoni.ai"
          git add .
          git commit -m "Digest $DATE"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

      - name: Send push notifications via ntfy.sh
        run: |
          DATE=$(date +'%Y-%m-%d')
          PAGES_URL="https://koral-star.github.io/Agent-ai-security"
          COUNT=$(jq length /tmp/ntfy_notifications.json)
          for i in $(seq 0 $((COUNT - 1))); do
            TITLE=$(jq -r ".[$i].title" /tmp/ntfy_notifications.json)
            BODY=$(jq -r ".[$i].body" /tmp/ntfy_notifications.json)
            FULL_BODY="$BODY

📊 Full presentation: $PAGES_URL"
            curl -s \
              -H "Title: $TITLE" \
              -H "Priority: high" \
              -H "Tags: lock" \
              -H "Click: $PAGES_URL" \
              -d "$FULL_BODY" \
              https://ntfy.sh/koral-shimoni-ai-security-2026
            sleep 2
          done

      - name: Create GitHub Issue with morning brief
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const brief = fs.readFileSync('/tmp/brief.md', 'utf8');
            const date = '${{ steps.digest.outputs.date }}';
            const pagesUrl = 'https://koral-star.github.io/Agent-ai-security';
            const body = brief + `\n\n---\n📊 [View full presentation](${pagesUrl}) · [Archive](${pagesUrl}/archive.html)`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 AI Security Brief — ${date}`,
              body: body,
              labels: ['digest']
            });

      - name: Commit and push digest files
        run: |
          git config user.name "AI Security Digest Bot"
          git config user.email "digest-bot@koral-shimoni.ai"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new content today, skipping commit."
          else
            git commit -m "Daily AI Security Digest $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi

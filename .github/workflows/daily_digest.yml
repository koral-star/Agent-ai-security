name: Daily AI Security Digest

on:
  schedule:
    - cron: '0 4 * * *'  # Every day at 7:00 AM Israel time (UTC+3)
  workflow_dispatch:       # Allow manual trigger anytime

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest script
        run: python3 daily_digest.py

      - name: Read digest content
        id: digest
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          cp digests/$DATE.md /tmp/digest_content.md
          # Create short summary for push notification (first 4000 chars)
          head -c 4000 /tmp/digest_content.md > /tmp/digest_short.md

      - name: Send push notification via ntfy.sh
        run: |
          DATE=$(date +'%Y-%m-%d')
          CONTENT=$(cat /tmp/digest_short.md)
          curl -s \
            -H "Title: 🔐 AI Security Digest — $DATE" \
            -H "Priority: default" \
            -H "Tags: lock,ai" \
            -d "$CONTENT" \
            https://ntfy.sh/koral-shimoni-ai-security-2026

      - name: Create GitHub Issue with full digest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('/tmp/digest_content.md', 'utf8');
            const date = '${{ steps.digest.outputs.date }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 AI Security Digest — ${date}`,
              body: content,
              labels: ['digest']
            });

      - name: Commit and push digest
        run: |
          git config user.name "AI Security Digest Bot"
          git config user.email "digest-bot@koral-shimoni.ai"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new content today, skipping commit."
          else
            git commit -m "Daily AI Security Digest $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi

name: Daily AI Security Digest

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 7:00 AM UTC
  workflow_dispatch:       # Allow manual trigger anytime

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest script
        run: python3 daily_digest.py

      - name: Read digest content
        id: digest
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          # Store content in a file to avoid shell escaping issues
          cp digests/$DATE.md /tmp/digest_content.md

      - name: Create GitHub Issue with digest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('/tmp/digest_content.md', 'utf8');
            const date = '${{ steps.digest.outputs.date }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 AI Security Digest — ${date}`,
              body: content,
              labels: ['digest']
            });

      - name: Commit and push digest
        run: |
          git config user.name "AI Security Digest Bot"
          git config user.email "digest-bot@koral-shimoni.ai"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new content today, skipping commit."
          else
            git commit -m "Daily AI Security Digest $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi

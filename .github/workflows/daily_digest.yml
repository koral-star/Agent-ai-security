name: Daily AI Security Digest

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 7:00 AM UTC
  workflow_dispatch:       # Allow manual trigger anytime

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest script
        run: python3 daily_digest.py

      - name: Read digest content
        id: digest
        run: |
          DATE=$(date +'%Y-%m-%d')
          CONTENT=$(cat digests/$DATE.md)
          # Truncate to 50000 chars for email safety
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "${CONTENT:0:50000}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Send digest by email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AI Security Digest — ${{ steps.digest.outputs.date }}"
          to: koral.s930720@gmail.com
          from: AI Security Digest <${{ secrets.GMAIL_USER }}>
          body: ${{ steps.digest.outputs.content }}
          content_type: text/plain

      - name: Commit and push digest
        run: |
          git config user.name "AI Security Digest Bot"
          git config user.email "digest-bot@koral-shimoni.ai"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new content today, skipping commit."
          else
            git commit -m "Daily AI Security Digest $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi
